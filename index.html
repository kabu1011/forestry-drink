<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飲料點餐系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; width: 100%; max-width: 500px; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 8px solid #4a90e2; }
        h2 { color: #4a90e2; text-align: center; }
        .menu-box { border: 1px solid #ddd; padding: 10px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        img { width: 100%; border-radius: 5px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #4a90e2; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="container">
        <h2>🧋 今日飲料點餐</h2>
        
        <div class="menu-box">
            <p>📋 今日菜單預覽</p>
            <img src="menu.png" alt="今日菜單">
        </div>

        <form id="orderForm">
            <div class="input-group">
                <label>您的姓名：</label>
                <input type="text" id="name" required placeholder="例如：王小明">
            </div>
            <div class="input-group">
                <label>飲料品項：</label>
                <input type="text" id="drink" required placeholder="例如：珍珠奶茶大杯">
            </div>
            <div class="input-group">
                <label>糖度冰塊：</label>
                <input type="text" id="sugar_ice" required placeholder="例如：微糖微冰">
            </div>
            <div class="input-group">
                <label>備註：</label>
                <textarea id="note" rows="2" placeholder="是否有加料或其他需求"></textarea>
            </div>
            <button type="button" onclick="submitToSheet()">確認送出點餐</button>
        </form>
    </div>

    <script>
        function submitToSheet() {
            const btn = document.querySelector('button');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            const url = '你的GAS網址'; // <--- 這裡貼上你的網址
            const formData = new URLSearchParams();
            formData.append('name', document.getElementById('name').value);
            formData.append('drink', document.getElementById('drink').value);
            formData.append('sugar_ice', document.getElementById('sugar_ice').value);
            formData.append('note', document.getElementById('note').value);

            fetch(url, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            }).then(() => {
                alert('點餐成功！資料已同步至試算表。');
                document.getElementById('orderForm').reset();
                btn.disabled = false;
                btn.innerText = "確認送出點餐";
            }).catch(err => {
                alert('錯誤：' + err);
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
